name: Release

# Cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds an optimized binary per OS and attaches the archives to the GitHub
# Release for that tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create/upload the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p stats-melee-app --target ${{ matrix.target }}

      # Stage the binary alongside the docs and an `assets/` folder (the icon
      # PNGs are Nintendo IP and gitignored, so releases ship without art and
      # fall back to drawn badges — users drop their own pack into assets/).
      - name: Package
        shell: bash
        run: |
          stage="stats-melee-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$stage/assets"
          cp -r stats-melee-app/assets/. "$stage/assets/" 2>/dev/null || true
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/stats-melee-app.exe" "$stage/"
            7z a "${stage}.zip" "$stage" >/dev/null
            echo "ASSET=${stage}.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/stats-melee-app" "$stage/"
            if [ "${{ runner.os }}" = "Linux" ]; then
              # Bundle the desktop-integration installer (menu entry + icon)
              # inside the tarball; build.rs emitted the launcher PNG.
              cp stats-melee-app/linux/install.sh \
                 stats-melee-app/linux/uninstall.sh \
                 stats-melee-app/linux/stats-melee.desktop.in "$stage/"
              cp "target/${{ matrix.target }}/release/stats-melee.png" "$stage/"
              chmod +x "$stage/install.sh" "$stage/uninstall.sh"
            fi
            tar czf "${stage}.tar.gz" "$stage"
            echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"
          fi

      # Windows only: wrap the staged files in a per-user NSIS installer that
      # creates Start Menu + Desktop shortcuts and an uninstaller. The app
      # icon is the .ico build.rs drops next to the .exe.
      - name: Build Windows installer (NSIS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $root = (Get-Location).Path
          $stage = Join-Path $root "stats-melee-${env:GITHUB_REF_NAME}-${{ matrix.target }}"
          $ico = Join-Path $root "target\${{ matrix.target }}\release\app.ico"
          $setupName = "stats-melee-Setup-${env:GITHUB_REF_NAME}.exe"
          $setup = Join-Path $root $setupName
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=${env:GITHUB_REF_NAME}" `
            "/DOUT_FILE=$setup" `
            "/DSTAGE_DIR=$stage" `
            "/DAPP_ICON=$ico" `
            "stats-melee-app\installer\installer.nsi"
          if ($LASTEXITCODE -ne 0) { throw "makensis failed ($LASTEXITCODE)" }
          "SETUP_ASSET=$setupName" >> $env:GITHUB_ENV

      # macOS only: wrap the binary in a .app bundle (icon from the iconset
      # build.rs emitted) and ship it in a drag-to-Applications .dmg.
      - name: Build macOS .app + .dmg
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}" # strip leading v for the plist version
          app="stats-melee.app"
          rm -rf "$app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          iconutil -c icns "target/${{ matrix.target }}/release/AppIcon.iconset" \
            -o "$app/Contents/Resources/AppIcon.icns"
          sed "s/@VERSION@/${ver}/g" stats-melee-app/macos/Info.plist \
            > "$app/Contents/Info.plist"
          cp "target/${{ matrix.target }}/release/stats-melee-app" "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/stats-melee-app"
          # Ad-hoc sign the bundle. We have no Apple Developer cert (no
          # notarization), but a coherent signature turns Gatekeeper's hard
          # "damaged" block into the normal "unverified developer" prompt that
          # right-click -> Open / "Open Anyway" can get past.
          codesign --force --deep --sign - "$app"
          codesign --verify --strict "$app"
          dmgroot="dmgroot-${{ matrix.target }}"
          rm -rf "$dmgroot"; mkdir -p "$dmgroot"
          cp -R "$app" "$dmgroot/"
          ln -s /Applications "$dmgroot/Applications"
          dmg="stats-melee-${GITHUB_REF_NAME}-${{ matrix.target }}.dmg"
          hdiutil create -volname "stats-melee" -srcfolder "$dmgroot" \
            -ov -format UDZO "$dmg"
          echo "DMG_ASSET=$dmg" >> "$GITHUB_ENV"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          draft: true # review the assembled release before publishing it

      - name: Attach Windows installer to GitHub Release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SETUP_ASSET }}
          draft: true

      - name: Attach macOS .dmg to GitHub Release
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_ASSET }}
          draft: true
