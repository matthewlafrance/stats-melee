name: Release

# Cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds an optimized binary per OS and attaches the archives to the GitHub
# Release for that tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create/upload the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p stats-melee-app --target ${{ matrix.target }}

      # Stage the binary alongside the docs and an `assets/` folder (the icon
      # PNGs are Nintendo IP and gitignored, so releases ship without art and
      # fall back to drawn badges — users drop their own pack into assets/).
      - name: Package
        shell: bash
        run: |
          stage="stats-melee-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$stage/assets"
          cp -r stats-melee-app/assets/. "$stage/assets/" 2>/dev/null || true
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/stats-melee-app.exe" "$stage/"
            7z a "${stage}.zip" "$stage" >/dev/null
            echo "ASSET=${stage}.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/stats-melee-app" "$stage/"
            tar czf "${stage}.tar.gz" "$stage"
            echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          draft: true # review the assembled release before publishing it
